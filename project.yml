name: Nous
options:
  bundleIdPrefix: com.nous.app
packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.29.1"
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"
targets:
  Nous:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources: [Sources/Nous]
    info:
      path: Info.plist
      properties:
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        ATSApplicationFontsPath: Fonts
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXEmbedders
      - sdk: Accelerate.framework
      - sdk: SpriteKit.framework
  ProvocationFixtureRunner:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/ProvocationFixtureRunner
      - path: Sources/Nous/Services/ProvocationJudge.swift
        group: ProvocationFixtureRunner/Shared
      - path: Sources/Nous/Services/LLMService.swift
        group: ProvocationFixtureRunner/Shared
      - path: Sources/Nous/Models/JudgeVerdict.swift
        group: ProvocationFixtureRunner/Shared
      - path: Sources/Nous/Models/CitableEntry.swift
        group: ProvocationFixtureRunner/Shared
      - path: Sources/Nous/Models/ChatMode.swift
        group: ProvocationFixtureRunner/Shared
      - path: Sources/Nous/Models/MemoryEntry.swift
        group: ProvocationFixtureRunner/Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  NousTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources: [Tests/NousTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Nous
