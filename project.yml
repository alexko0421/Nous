name: Nous
options:
  bundleIdPrefix: com.nous.app
packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "1.19.0"
targets:
  Nous:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources: [Sources/Nous]
    info:
      path: Info.plist
      properties:
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        ATSApplicationFontsPath: Fonts
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-examples
        product: LLM
      - package: mlx-swift-examples
        product: Embedders
      - framework: Accelerate
      - framework: SpriteKit
  NousTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources: [Tests/NousTests]
    dependencies:
      - target: Nous
